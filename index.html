<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUCTAT</title>
  <script>
    // FORCE HTTP - évite localStorage indisponible
    if (window.location.protocol === 'file:') {
      window.location.href = 'http://localhost/web/index.html';
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0B3D6E 0%, #185FA5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .content {
      text-align: center;
      padding: 40px;
    }
    .flag-img {
      width: 100px;
      height: 70px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }
    h1 { margin-bottom: 20px; }
    p { margin-bottom: 30px; opacity: 0.9; }
    a {
      display: inline-block;
      padding: 12px 30px;
      background: #FDEF42;
      color: #0B3D6E;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 20px;
    }
    a:hover { background: white; }
  </style>
</head>
<body>
  <div class="content">
    <img src="images/senegal.png" alt="Drapeau du Sénégal" class="flag-img">
    <h1>🔐 MUCTAT</h1>
    <p>Redirection en cours...</p>
    <p style="font-size: 12px; opacity: 0.7;" id="url-display"></p>
  </div>

  <script>
    // Force redirection vers HTTP si en file://
    if (window.location.protocol === 'file:') {
      // Rediriger vers http://localhost/web/login.html
      window.location.href = 'http://localhost/web/login.html';
    } else {
      // Déjà en HTTP - aller directement à login
      window.location.href = '/web/login.html';
    }
  </script>
</body>
</html>
